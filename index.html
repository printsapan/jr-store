<title>คลังกระเบื้อง JR Store</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&family=Bebas+Neue&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Sarabun',sans-serif;background:#f7f7f4;color:#1a1a1a;min-height:100dvh;max-width:480px;margin:0 auto;overflow-x:hidden;}
:root{--bg:#f7f7f4;--card:#fff;--card2:#f0f0eb;--accent:#ea580c;--blue:#2563eb;--gold:#92400e;--green:#16a34a;--sub:#6b7280;--border:rgba(0,0,0,0.1);}
#loginScreen{position:fixed;inset:0;background:linear-gradient(160deg,#fff7ed,#fff);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;}
.header{background:linear-gradient(180deg,#ede8e0,#fff);padding:12px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.hlogo{width:34px;height:34px;border-radius:9px;overflow:hidden;flex-shrink:0;}
.hlogo img{width:100%;height:100%;object-fit:cover;}
.header h1{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:#92400e;line-height:1.1;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.role-tag{padding:3px 9px;border-radius:50px;font-size:9px;font-weight:800;background:rgba(234,88,12,.1);color:#ea580c;border:1px solid rgba(234,88,12,.2);}
.logout{cursor:pointer;opacity:.55;}
.nav{display:flex;background:#fff;border-bottom:1px solid var(--border);}
.nbtn{flex:1;padding:10px 4px;text-align:center;font-size:10px;font-weight:700;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px;}
.nbtn .ni{width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.nbtn.active{color:var(--accent);border-bottom-color:var(--accent);}
.page{display:none;padding:14px 14px 80px;}
.page.active{display:block;}
.search-wrap{position:relative;margin-bottom:14px;}
.search-wrap input{width:100%;background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:13px 46px 13px 16px;color:#1a1a1a;font-family:'Sarabun',sans-serif;font-size:15px;outline:none;transition:border-color .2s;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.search-wrap input:focus{border-color:var(--blue);}
.sico{position:absolute;right:14px;top:50%;transform:translateY(-50%);}
.hint-area{text-align:center;padding:36px 20px;color:var(--sub);}
.hint-area .hi{margin-bottom:10px;display:flex;justify-content:center;}
.rcard{background:#fff;border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:12px;cursor:pointer;transition:border-color .15s,transform .1s;animation:fadeIn .2s ease;box-shadow:0 2px 8px rgba(0,0,0,.05);}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.rcard:active{transform:scale(0.98);}
.rcard-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
.loc-pill{background:linear-gradient(135deg,#dbeafe,#bfdbfe);border:1px solid rgba(37,99,235,.25);border-radius:10px;padding:8px 10px;text-align:center;min-width:56px;flex-shrink:0;}
.loc-pill .lb{font-family:'Bebas Neue',sans-serif;font-size:24px;color:#1e40af;line-height:1;}
.loc-pill .ls{font-size:9px;color:var(--sub);margin-top:1px;}
.rinfo{flex:1;min-width:0;}
.rinfo-size{font-size:11px;color:var(--sub);margin-bottom:6px;}
.tile-list{display:flex;flex-direction:column;gap:6px;}
.tile-row{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#f0f0eb;border-radius:8px;}
.tile-name{flex:1;font-weight:700;font-size:13px;}
.tile-qty{font-size:12px;color:var(--green);font-weight:700;white-space:nowrap;}
.tile-qty.zero{color:var(--sub);}
.warn-box{background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:7px 12px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.warn-box span{font-size:12px;font-weight:700;color:#b91c1c;}
.ftabs{display:flex;gap:6px;margin-bottom:12px;}
.ftab{flex:1;padding:8px 4px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--sub);font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Sarabun',sans-serif;}
.ftab.active{background:var(--accent);border-color:var(--accent);color:white;}
.mlegend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;}
.mleg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--sub);}
.mleg-dot{width:11px;height:11px;border-radius:3px;}
.wh-scroll{overflow-x:auto;padding-bottom:8px;}
.wh-map{display:flex;flex-direction:column;gap:3px;min-width:420px;}
.road{height:20px;background:repeating-linear-gradient(90deg,rgba(250,204,21,.5) 0,rgba(250,204,21,.5) 10px,transparent 10px,transparent 20px);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;color:#a16207;letter-spacing:3px;margin:2px 0;position:relative;}
.road::after{content:'- - - - - - - - - - - - - - - - - - - - - - -';position:absolute;font-size:7px;color:rgba(161,98,7,.5);letter-spacing:2px;}
.stockzone{height:20px;background:#f3f4f6;border:1px dashed #d1d5db;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#6b7280;}
.srow{display:flex;align-items:stretch;gap:3px;}
.rtag{font-family:'Bebas Neue',sans-serif;font-size:14px;color:#92400e;writing-mode:vertical-rl;transform:rotate(180deg);background:#fef3c7;border-radius:4px;display:flex;align-items:center;justify-content:center;padding:2px 3px;min-width:19px;flex-shrink:0;}
.mslot{width:35px;height:35px;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s;border:1px solid transparent;overflow:hidden;}
.mslot:active{transform:scale(0.88);}
.mslot.empty{background:#f3f4f6;border-color:#e5e7eb;color:#9ca3af;}
.mslot.full{background:linear-gradient(135deg,#dbeafe,#bfdbfe);border-color:rgba(37,99,235,.3);color:#1e40af;}
.mslot.multi{background:linear-gradient(135deg,#1e3a8a,#1e40af);border-color:rgba(30,64,175,.5);color:#bfdbfe;}
.sid{font-weight:800;font-size:8px;}
.snm{font-size:7px;opacity:.75;max-width:33px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fsec{background:#fff;border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.ftitle{font-weight:800;font-size:13px;color:#92400e;margin-bottom:12px;}
.fg{margin-bottom:11px;}
.fg label{display:block;font-size:10px;color:var(--sub);font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.fg input,.fg select,.fg textarea{width:100%;background:#f0f0eb;border:1.5px solid var(--border);border-radius:9px;padding:10px 12px;color:#1a1a1a;font-family:'Sarabun',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue);}
.fg textarea{resize:none;}
.lgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.btn-save{width:100%;padding:14px;background:linear-gradient(135deg,#f97316,#ea580c);color:white;border:none;border-radius:12px;font-family:'Sarabun',sans-serif;font-weight:800;font-size:15px;cursor:pointer;box-shadow:0 4px 16px rgba(234,88,12,.25);}
.btn-save:active{opacity:.9;transform:scale(0.98);}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.sc{background:#fff;border:1px solid var(--border);border-radius:13px;padding:13px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.sc .n{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;}
.sc .l{font-size:10px;color:var(--sub);margin-top:2px;}
.sc.r .n{color:var(--accent);}.sc.b .n{color:var(--blue);}.sc.g .n{color:var(--green);}.sc.o .n{color:#92400e;}
.sec-t{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--sub);margin-bottom:8px;}
.lcard{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.lrow{display:flex;align-items:center;gap:10px;padding:11px 13px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.lrow:last-child{border-bottom:none;}
.lrow:active{background:#f0f0eb;}
.lloc{background:#f0f0eb;border-radius:7px;padding:4px 8px;font-family:'Bebas Neue',sans-serif;font-size:15px;color:#1e40af;min-width:52px;text-align:center;flex-shrink:0;}
.linfo{flex:1;min-width:0;}
.lnm{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lsub{font-size:10px;color:var(--sub);}
.larr{color:var(--sub);font-size:18px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:100;display:none;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.sheet{background:#fff;border-radius:22px 22px 0 0;border-top:3px solid var(--accent);padding:20px 18px 44px;width:100%;max-width:480px;animation:su .25s cubic-bezier(.34,1.56,.64,1);max-height:92dvh;overflow-y:auto;}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sloc-box{background:linear-gradient(135deg,#dbeafe,#bfdbfe);border:1px solid rgba(37,99,235,.25);border-radius:14px;padding:14px;text-align:center;margin-bottom:14px;}
.sloc-big{font-family:'Bebas Neue',sans-serif;font-size:52px;color:#1e40af;line-height:1;letter-spacing:4px;}
.sloc-sub{font-size:12px;color:var(--sub);margin-top:3px;}
.sloc-floor{display:inline-block;background:rgba(37,99,235,.1);border:1px solid rgba(37,99,235,.2);border-radius:50px;padding:3px 12px;font-size:11px;color:var(--blue);font-weight:700;margin-top:6px;}
.grid2d-wrap{background:#f3f4f6;border-radius:12px;padding:10px;margin-bottom:14px;}
.grid2d-title{font-size:10px;font-weight:700;color:var(--sub);text-align:center;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;}
.sheet-tiles{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.stile{background:#f0f0eb;border-radius:12px;padding:12px 14px;border:1px solid var(--border);}
.stile-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.stile-name{font-size:15px;font-weight:800;}
.stile-qty{font-size:12px;font-weight:700;color:var(--green);}
.stile-qty.zero{color:var(--sub);}
.stile-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.stile-field .fl{font-size:10px;color:var(--sub);}
.stile-field .fv{font-size:13px;font-weight:700;margin-top:1px;}
.sbtns{display:flex;flex-direction:column;gap:8px;}
.sclose{width:100%;padding:12px;background:#f0f0eb;color:#1a1a1a;border:none;border-radius:10px;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.sedit{width:100%;padding:12px;background:rgba(37,99,235,.08);color:var(--blue);border:1px solid rgba(37,99,235,.2);border-radius:10px;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.smove{width:100%;padding:12px;background:rgba(22,163,74,.08);color:var(--green);border:1px solid rgba(22,163,74,.2);border-radius:10px;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.sdel{width:100%;padding:12px;background:rgba(234,88,12,.08);color:var(--accent);border:1px solid rgba(234,88,12,.2);border-radius:10px;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);background:#fff;border:1px solid var(--border);padding:10px 20px;border-radius:50px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;z-index:300;white-space:nowrap;max-width:90vw;box-shadow:0 4px 20px rgba(0,0,0,.12);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:rgba(22,163,74,.3);color:var(--green);}
.toast.err{border-color:rgba(234,88,12,.3);color:var(--accent);}
.acc-item{background:#fff;border:1px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden;}
.acc-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer;user-select:none;}
.acc-hdr-title{font-size:13px;font-weight:800;color:var(--accent);}
.acc-body{display:none;border-top:1px solid #f0f0eb;padding:4px 14px 12px;}
.acc-body.open{display:block;}
</style>
</head>

async function doFaceId(){
  try{
    var sess=localStorage.getItem('jr_biometric');
    if(!sess){showToast('❌ ยังไม่ได้ตั้งค่า Face ID','err');return;}
    var s=JSON.parse(sess);
    var ok=await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
    if(!ok){showToast('❌ อุปกรณ์ไม่รองรับ','err');return;}
    // Use credential to verify
    var getOpts={
      publicKey:{
        challenge:new Uint8Array(32),
        allowCredentials:[{type:'public-key',id:base64ToBuffer(s.credId)}],
        userVerification:'required',
        timeout:60000
      }
    };
    await navigator.credentials.get(getOpts);
    // Success - login with cached credentials
    var found=null;
    for(var i=0;i<users.length;i++){
      if(users[i].userId.toLowerCase()===s.userId.toLowerCase()&&users[i].password===s.password){found=users[i];break;}
    }
    if(found){
      currentRole=found.role;currentUser=found;
      startApp();
      loadItemsFromFirestore(function(){renderList();renderMap();});
    } else {
      showToast('❌ ไม่พบผู้ใช้ กรุณา login ด้วยรหัสก่อน','err');
      localStorage.removeItem('jr_biometric');
      document.getElementById('faceIdBtn').style.display='none';
    }
  }catch(e){
    if(e.name!=='NotAllowedError') showToast('❌ Face ID ล้มเหลว: '+e.message,'err');
  }
}

async function registerFaceId(userId,password){
  try{
    if(!window.PublicKeyCredential) return;
    var ok=await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
    if(!ok) return;
    var challenge=new Uint8Array(32);
    crypto.getRandomValues(challenge);
    var createOpts={
      publicKey:{
        challenge:challenge,
        rp:{name:'JR Store',id:location.hostname},
        user:{id:new TextEncoder().encode(userId),name:userId,displayName:userId},
        pubKeyCredParams:[{type:'public-key',alg:-7},{type:'public-key',alg:-257}],
        authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},
        timeout:60000
      }
    };
    var cred=await navigator.credentials.create(createOpts);
    var credId=bufferToBase64(cred.rawId);
    localStorage.setItem('jr_biometric',JSON.stringify({userId:userId,password:password,credId:credId}));
    document.getElementById('faceIdBtn').style.display='block';
    showToast('✅ ตั้งค่า Face ID สำเร็จ!','ok');
  }catch(e){
    if(e.name!=='NotAllowedError') console.log('FaceID register:',e.message);
  }
}

function bufferToBase64(buf){
  return btoa(String.fromCharCode(...new Uint8Array(buf)));
}
function base64ToBuffer(b64){
  var bin=atob(b64);
  var buf=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++) buf[i]=bin.charCodeAt(i);
  return buf.buffer;
}

function loadUsersOnStart(){
  // 1. defaultUsers เสมอ (รหัสถูกต้อง 100%)
  users=JSON.parse(JSON.stringify(defaultUsers));
  // 2. เพิ่ม users ใหม่จาก cache
  try{
    var extra=JSON.parse(localStorage.getItem('jr_users')||'[]');
    extra.forEach(function(cu){
      if(!defaultUsers.some(function(d){return d.id===cu.id;})) users.push(cu);
    });
  }catch(e){}
  // 3. auto-login ทันที ไม่รอ
  tryAutoLogin();
  // 4. sync Firestore background
  setTimeout(function(){
    try{
      db.collection('users').get().then(function(snap){
        if(!snap.empty){
          var extras=snap.docs
            .map(function(d){return Object.assign({id:d.id},d.data());})
            .filter(function(u){return !defaultUsers.some(function(d){return d.id===u.id;});});
          // merge extras เข้า users
          users=JSON.parse(JSON.stringify(defaultUsers));
          extras.forEach(function(u){users.push(u);});
          try{localStorage.setItem('jr_users',JSON.stringify(extras));}catch(e){}
        } else {
          // upload defaultUsers ขึ้น Firestore
          var batch=db.batch();
          defaultUsers.forEach(function(u){batch.set(db.collection('users').doc(u.id),u);});
          batch.commit().catch(function(){});
        }
      }).catch(function(){});
    }catch(e){}
  },500);
}

}

function loadItemsFromFirestore(cb){
  showLoadingOverlay('⏳ กำลังโหลดข้อมูล...');
  db.collection('tiles').get().then(function(snap){
    if(snap.empty){
      items=JSON.parse(JSON.stringify(DEMO));
      uploadDemoToFirestore(function(){hideLoadingOverlay();if(cb)cb();});
    } else {
      items=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
      hideLoadingOverlay();if(cb)cb();
    }
  }).catch(function(e){
    console.error(e);
    if(!items||!items.length) items=JSON.parse(JSON.stringify(DEMO));
    hideLoadingOverlay();if(cb)cb();
  });
}

function doSearch(q){
  if(q.trim()==='__export__'){
    document.getElementById('sr').innerHTML='<div style="background:#f7f7f4;border-radius:12px;padding:14px;"><div style="font-size:12px;font-weight:700;color:#ea580c;margin-bottom:8px;">📦 Export</div><textarea readonly style="width:100%;height:120px;font-size:10px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:8px;font-family:monospace;resize:none;" onclick="this.select()">'+JSON.stringify(items)+'</textarea></div>';
    return;
  }
  if(currentRole==='sales'){doSearchWithFilter(q,document.getElementById('flt_size').value,document.getElementById('flt_surface').value,document.getElementById('flt_color')?document.getElementById('flt_color').value:'');return;}
  var c=document.getElementById('sr');
  if(!q.trim()){c.innerHTML='<div class="hint-area"><p>พิมพ์ชื่อสินค้า</p></div>';return;}
  var ql=q.toLowerCase().trim();
  var slotMap={};
  for(var i=0;i<items.length;i++){
    var it=items[i];if(isVacant(it))continue;
    var ft=(it.name+' '+fmtSize(it.desc)+' '+(it.desc||'')+' '+(it.brand||'')+' '+(it.detail||'')).toLowerCase();
    if(ft.indexOf(ql)>=0){var key=it.row+'-'+it.col+'-'+it.floor;if(!slotMap[key])slotMap[key]=[];slotMap[key].push(it);}
  }
  var keys=Object.keys(slotMap);
  if(!keys.length){c.innerHTML='<div class="hint-area"><p>ไม่พบ "<b>'+q+'</b>"</p></div>';return;}
  var nameMap={};
  for(var ki=0;ki<keys.length;ki++){var tiles=slotMap[keys[ki]];for(var ti=0;ti<tiles.length;ti++){var t=tiles[ti];if(!nameMap[t.name])nameMap[t.name]={name:t.name,desc:t.desc,brand:t.brand,totalQty:0,locs:[],hasWarn:false};nameMap[t.name].totalQty+=(t.qty||0);nameMap[t.name].locs.push({row:t.row,col:t.col,floor:t.floor,qty:t.qty||0});if(realTilesAt(t.row,t.col,t.floor).length>1)nameMap[t.name].hasWarn=true;}}
  var nameKeys=Object.keys(nameMap);
  c.innerHTML='';
  for(var ni=0;ni<nameKeys.length;ni++){
    (function(g){
      var locStr=g.locs.map(function(l){return l.row+l.col+'-F'+l.floor;}).join(', ');
      var card=document.createElement('div');card.className='rcard';
      card.onclick=function(){openSheetByName(g.name);};
      var warn=g.hasWarn?'<div class="warn-box"><span>⚠️</span><span>ระวังผิด! มีหลายลายในช่อง</span></div>':'';
      var qty=g.totalQty?'<div style="font-size:22px;font-weight:800;color:#ea580c;font-family:Bebas Neue,sans-serif;line-height:1;">'+g.totalQty+'</div><div style="font-size:10px;color:#6b7280;">กล่อง</div>':'<div style="font-size:12px;color:#9ca3af;">ไม่ระบุ</div>';
      card.innerHTML=warn+'<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;"><div style="flex:1;min-width:0;"><div style="font-size:16px;font-weight:800;">'+g.name+'</div><div style="font-size:11px;color:#6b7280;margin-top:2px;">'+fmtSize(g.desc)+(g.brand?' · '+g.brand:'')+'</div><div style="font-size:11px;color:#9ca3af;margin-top:3px;">('+locStr+')</div></div><div style="text-align:right;flex-shrink:0;">'+qty+'</div></div>';
      c.appendChild(card);
    })(nameMap[nameKeys[ni]]);
  }

}

function doSearchWithFilter(q,sf,surface,color){
  var c=document.getElementById('sr');
  var hasQ=q&&q.trim(),hasF=sf||surface||color;
  if(!hasQ&&!hasF){c.innerHTML='<div class="hint-area"><p>ค้นหากระเบื้องปูพื้น,ผนัง</p></div>';return;}
  var ql=q?q.toLowerCase().trim():'';
  var nameMap={};
  for(var i=0;i<items.length;i++){
    var it=items[i];if(isVacant(it))continue;
    var mQ=true,mF=true;
    if(ql){var ft=(it.name+' '+fmtSize(it.desc)+' '+(it.desc||'')+' '+(it.brand||'')+' '+(it.detail||'')+' '+(it.desc||'').replace('x','×')+' '+(it.desc||'').replace('×','x')).toLowerCase();mQ=ft.indexOf(ql.replace('×','x').replace('x','×'))>=0||ft.indexOf(ql)>=0;}
    if(sf) mF=(it.desc===sf);
    if(surface&&mF) mF=(it.surface===surface);
    if(color&&mF) mF=((it.detail||'').toLowerCase().indexOf(color.toLowerCase())>=0);
    if(mQ&&mF){if(!nameMap[it.name])nameMap[it.name]={name:it.name,desc:it.desc,brand:it.brand,totalQty:0,locs:[]};nameMap[it.name].totalQty+=(it.qty||0);nameMap[it.name].locs.push({row:it.row,col:it.col,floor:it.floor,qty:it.qty||0});}
  }
  var nameKeys=Object.keys(nameMap);
  if(!nameKeys.length){c.innerHTML='<div class="hint-area"><p>ไม่พบสินค้าที่ตรงกัน</p></div>';return;}
  c.innerHTML='';
  for(var ni=0;ni<nameKeys.length;ni++){
    (function(g){
      var locStr=g.locs.map(function(l){return l.row+l.col+'-F'+l.floor;}).join(', ');
      var card=document.createElement('div');card.className='rcard';
      card.onclick=function(){openSheetByName(g.name);};
      card.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;"><div style="flex:1;min-width:0;"><div style="font-size:16px;font-weight:800;">'+g.name+'</div><div style="font-size:11px;color:#6b7280;margin-top:2px;">'+fmtSize(g.desc)+(g.brand?' · '+g.brand:'')+'</div><div style="font-size:11px;color:#9ca3af;margin-top:3px;">('+locStr+')</div></div><div style="text-align:right;flex-shrink:0;">'+(g.totalQty?'<div style="font-size:22px;font-weight:800;color:#ea580c;font-family:Bebas Neue,sans-serif;line-height:1;">'+g.totalQty+'</div><div style="font-size:10px;color:#6b7280;">กล่อง</div>':'<div style="font-size:12px;color:#9ca3af;">ไม่ระบุ</div>')+'</div></div>';
      c.appendChild(card);
    })(nameMap[nameKeys[ni]]);
  }
}

function openSheetByName(name){
  var locs=items.filter(function(x){return x.name===name&&!isVacant(x);});
  if(!locs.length) return;
  if(locs.length===1){openSheet(locs[0].row,locs[0].col,locs[0].floor);return;}
  var ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end;justify-content:center;';
  var inner=document.createElement('div');
  inner.style.cssText='background:#fff;border-radius:22px 22px 0 0;border-top:3px solid #ea580c;padding:20px 18px 44px;width:100%;max-width:480px;';
  var h='<div style="font-size:15px;font-weight:800;color:#92400e;margin-bottom:4px;">'+name+'</div>';
  h+='<div style="font-size:12px;color:#6b7280;margin-bottom:14px;">เลือกตำแหน่งที่ต้องการดู</div>';
  h+='<div id="locPickerList"></div>';
  h+='<button id="locPickerClose" style="width:100%;padding:12px;background:#f0f0eb;border:none;border-radius:11px;font-family:Sarabun,sans-serif;font-size:13px;font-weight:700;cursor:pointer;">ปิด</button>';
  inner.innerHTML=h;
  ov.appendChild(inner);
  document.body.appendChild(ov);
  document.getElementById('locPickerClose').onclick=function(){ov.remove();};
  ov.onclick=function(e){if(e.target===ov)ov.remove();};
  var list=document.getElementById('locPickerList');
  for(var i=0;i<locs.length;i++){
    (function(l){
      var div=document.createElement('div');
      div.style.cssText='display:flex;align-items:center;gap:12px;padding:12px 14px;background:#f7f7f4;border-radius:12px;margin-bottom:8px;cursor:pointer;';
      div.innerHTML='<div class="loc-pill"><div class="lb">'+l.row+l.col+'</div><div class="ls">ชั้น '+l.floor+'</div></div>'+
        '<div style="flex:1;"><div style="font-size:13px;font-weight:700;">'+ROW_DESC[l.row]+' · ช่อง '+l.col+'</div>'+
        '<div style="font-size:12px;color:#16a34a;font-weight:700;">'+(l.qty?'📦 '+l.qty+' กล่อง':'ไม่ระบุ')+'</div></div>'+
        '<div style="font-size:20px;color:#9ca3af;">›</div>';
      div.onclick=function(e){e.stopPropagation();ov.remove();openSheet(l.row,l.col,l.floor);};
      list.appendChild(div);
    })(locs[i]);
  }
}

function makeGrid2D(row,col,floor){
  var COLS=10,FLOORS=3,CW=22,CH=18,GAP=2,ROAD=12,PAD=18,PT=18,PB=22;
  var mirror=(row==='B'||row==='D');
  var shelfX=ROAD+PAD+18;
  var VW=shelfX+COLS*CW+(COLS-1)*GAP+ROAD+PAD+8;
  var shelfH=FLOORS*CH+(FLOORS-1)*GAP;
  var VH=PT+shelfH+PB;
  var roadX=mirror?(shelfX+COLS*CW+(COLS-1)*GAP+PAD):PAD;
  var PL=shelfX;
  var svg='<svg viewBox="0 0 '+VW+' '+VH+'" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%;max-width:340px;margin:0 auto;border-radius:8px;">';
  svg+='<rect width="'+VW+'" height="'+VH+'" fill="#f3f4f6" rx="8"/>';
  svg+='<rect x="'+roadX+'" y="'+PT+'" width="'+ROAD+'" height="'+shelfH+'" fill="rgba(250,204,21,.55)" rx="3"/>';
  svg+='<text x="'+VW/2+'" y="12" text-anchor="middle" font-size="9" fill="#92400e" font-family="Sarabun,sans-serif" font-weight="700">'+ROW_DESC[row]+'</text>';
  svg+='<text x="'+(VW-4)+'" y="12" text-anchor="end" font-size="9" fill="#ea580c" font-family="monospace" font-weight="bold">'+row+col+'-F'+floor+'</text>';
  for(var f=1;f<=FLOORS;f++){
    var ri=FLOORS-f,cy=PT+ri*(CH+GAP);
    svg+='<text x="'+(PL-4)+'" y="'+(cy+CH/2+3)+'" text-anchor="end" font-size="9" fill="#92400e" font-family="monospace" font-weight="bold">'+f+'</text>';
    for(var c2=1;c2<=COLS;c2++){
      var isHL=(c2===col&&f===floor);
      var dc=mirror?(COLS+1-c2):c2;
      var cx2=PL+(dc-1)*(CW+GAP);
      var rt=realTilesAt(row,c2,f);
      var fill,stroke;
      if(isHL){fill='#ea580c';stroke='#c0392b';}
      else if(rt.length>1){fill='#1e40af';stroke='rgba(30,64,175,.5)';}
      else if(rt.length>=1){fill='#bfdbfe';stroke='rgba(37,99,235,.3)';}
      else{fill='#e5e7eb';stroke='#d1d5db';}
      svg+='<rect x="'+cx2+'" y="'+cy+'" width="'+CW+'" height="'+CH+'" rx="3" fill="'+fill+'" stroke="'+stroke+'" stroke-width="0.7"/>';
      if(isHL) svg+='<text x="'+(cx2+CW/2)+'" y="'+(cy+CH/2+3)+'" text-anchor="middle" font-size="7" fill="white" font-family="monospace" font-weight="bold">'+c2+'</text>';
    }
  }
  for(var c2=1;c2<=COLS;c2++){
    var dc=mirror?(COLS+1-c2):c2;
    var cx2=PL+(dc-1)*(CW+GAP)+CW/2;
    svg+='<text x="'+cx2+'" y="'+(VH-4)+'" text-anchor="middle" font-size="8" fill="'+(c2===col?'#ea580c':'#9ca3af')+'" font-family="monospace" font-weight="'+(c2===col?'bold':'normal')+'">'+c2+'</text>';
  }
  // road label
  svg+='<text x="'+(roadX+ROAD/2)+'" y="'+(PT+shelfH/2+3)+'" text-anchor="middle" font-size="6" fill="#a16207" font-weight="700" font-family="Sarabun,sans-serif" transform="rotate(-90,'+(roadX+ROAD/2)+','+(PT+shelfH/2)+')">ถนน</text>';
  svg+='</svg>';
  // legend
  var leg='<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:6px;">'+
    '<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:#6b7280;"><div style="width:11px;height:11px;background:#1e40af;border-radius:2px;"></div>หลายลาย</div>'+
    '<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:#6b7280;"><div style="width:11px;height:11px;background:#bfdbfe;border:1px solid rgba(37,99,235,.3);border-radius:2px;"></div>1 ลาย</div>'+
    '<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:#6b7280;"><div style="width:11px;height:11px;background:#e5e7eb;border:1px solid #d1d5db;border-radius:2px;"></div>ว่าง</div>'+
    '<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:#6b7280;"><div style="width:11px;height:11px;background:repeating-linear-gradient(90deg,rgba(250,204,21,.7) 0,rgba(250,204,21,.7) 3px,transparent 3px,transparent 6px);border-radius:2px;"></div>ถนน</div>'+
    '<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:#ea580c;font-weight:700;"><div style="width:11px;height:11px;background:#ea580c;border-radius:2px;"></div>ตำแหน่งนี้</div>'+
    '</div>';
  return svg+leg;
}

function setFloor(f,btn){currentFloor=f;document.querySelectorAll('.ftab').forEach(function(t){t.classList.remove('active');});btn.classList.add('active');renderMap();}
function renderMap(){
  var h='<div style="display:flex;gap:3px;margin-bottom:3px;"><div style="width:54px;flex-shrink:0;"></div>';
  for(var c=1;c<=10;c++) h+='<div style="width:35px;text-align:center;font-size:8px;color:#9ca3af;">'+c+'</div>';
  h+='</div>';
  function mkRoad(lbl){return '<div style="display:flex;gap:3px;align-items:center;margin-bottom:3px;"><div style="width:54px;flex-shrink:0;font-size:8px;color:#a16207;text-align:right;padding-right:6px;font-weight:700;">'+lbl+'</div><div class="road" style="flex:1;margin:0;"><span style="font-size:7px;color:rgba(161,98,7,.7);letter-spacing:3px;z-index:1;">ถนน</span></div></div>';}
  function mkRow(row){
    var out='<div style="display:flex;gap:3px;align-items:center;margin-bottom:3px;"><div style="width:54px;flex-shrink:0;display:flex;align-items:center;justify-content:flex-end;gap:3px;padding-right:4px;"><div style="width:3px;height:35px;background:#fde047;border-radius:2px;"></div><div class="rtag">'+row+'</div></div>';
    for(var c=1;c<=10;c++){
      var rt=realTilesAt(row,c,currentFloor);
      var cls,nm='';
      if(rt.length>1){cls='multi';nm=rt.length+'ลาย';}
      else if(rt.length===1){cls='full';nm=rt[0].name.substring(0,4);}
      else{cls='empty';}
      out+='<div class="mslot '+cls+'" data-row="'+row+'" data-col="'+c+'" data-floor="'+currentFloor+'" onclick="openSheet(this.dataset.row,+this.dataset.col,+this.dataset.floor)" title="'+(rt.length?rt.map(function(x){return x.name;}).join(', '):'ว่าง')+'"><span class="sid">'+row+c+'</span>'+(nm?'<span class="snm">'+nm+'</span>':'')+'</div>';
    }
    out+='</div>';return out;
  }
  h+=mkRoad('ถนนบน');h+=mkRow('D');h+=mkRow('C');h+=mkRoad('กลาง');h+=mkRow('B');h+=mkRow('A');h+=mkRoad('ถนนล่าง');
  h+='<div style="display:flex;gap:3px;align-items:center;"><div style="width:54px;flex-shrink:0;font-size:8px;color:#a16207;text-align:right;padding-right:6px;">ทางเข้า</div><div class="stockzone" style="flex:1;">📦 กองของ</div></div>';
  document.getElementById('wmap').innerHTML=h;
  var leg=document.getElementById('mapLegend');
  leg.innerHTML=
  '<div class="mleg"><div class="mleg-dot" style="background:#1e3a8a;"></div>หลายลาย</div>'+
  '<div class="mleg"><div class="mleg-dot" style="background:#bfdbfe;border:1px solid rgba(37,99,235,.3);"></div>1 ลาย</div>'+
  '<div class="mleg"><div class="mleg-dot" style="background:#e5e7eb;border:1px solid #d1d5db;"></div>ว่าง</div>'+
  '<div class="mleg"><div class="mleg-dot" style="background:repeating-linear-gradient(90deg,rgba(250,204,21,.6) 0,rgba(250,204,21,.6) 4px,transparent 4px,transparent 8px);border-radius:2px;"></div>ถนน</div>';
}

function openSheet(row,col,floor){
  var allTiles=tilesAt(row,col,floor);
  var realTiles=realTilesAt(row,col,floor);
  document.getElementById('sm_loc').textContent=row+col;
  document.getElementById('sm_sub').textContent='แถว '+row+' · ช่อง '+col;
  document.getElementById('sm_floor').textContent='ชั้น '+floor+' — '+['','ล่างสุด','กลาง','บนสุด'][floor];
  document.getElementById('sm_grid').innerHTML=makeGrid2D(row,col,floor);
  var warnEl=realTiles.length>1?'<div class="warn-box"><span style="font-size:18px;">⚠️</span><span style="font-size:13px;font-weight:700;color:#b91c1c;">ระวังผิด! มี '+realTiles.length+' รายการใน 1 ช่อง</span></div>':'';
  document.getElementById('sm_warn').innerHTML=warnEl;
  var displayTiles=realTiles.length?realTiles:allTiles;
  var html='';
  for(var i=0;i<displayTiles.length;i++){
    var t=displayTiles[i];
    var tpbShow=t.customTpb||(TILES_PER_BOX[t.desc]||null);
    html+='<div class="stile"><div class="stile-header"><div class="stile-name">'+t.name+'</div><div class="stile-qty'+(t.qty?'':' zero')+'">'+(t.qty?'📦 '+t.qty+' กล่อง':'ไม่ระบุ')+'</div></div>';
    html+='<div class="stile-grid"><div class="stile-field"><div class="fl">ขนาด</div><div class="fv">'+fmtSize(t.desc)+'</div></div><div class="stile-field"><div class="fl">ตำแหน่ง</div><div class="fv">'+row+col+'-F'+floor+'</div></div><div class="stile-field"><div class="fl">แบรนด์</div><div class="fv">'+(t.brand||'—')+'</div></div><div class="stile-field"><div class="fl">ผิวหน้า</div><div class="fv">'+(t.surface||'—')+'</div></div>'+(tpbShow?'<div class="stile-field"><div class="fl">แพ็กละ</div><div class="fv">'+tpbShow+' แผ่น</div></div>':'')+(t.detail?'<div class="stile-field" style="grid-column:span 2"><div class="fl">สี/หมายเหตุ</div><div class="fv" style="font-size:12px;">'+t.detail+'</div></div>':'')+'</div>';
    if(t.photo) html+='<div data-tid="'+t.id+'" onclick="openPhoto(this.dataset.tid)" style="cursor:pointer;position:relative;margin-top:8px;text-align:center;"><img src="'+t.photo+'" style="width:50%;border-radius:10px;object-fit:contain;"/><div style="position:absolute;bottom:6px;right:8px;background:rgba(0,0,0,.45);border-radius:20px;padding:3px 10px;font-size:10px;color:white;">🔍 กดขยาย</div></div>';
    html+='</div>';
  }
  document.getElementById('sm_tiles').innerHTML=html;
  var isAdmin=currentRole==='admin'||currentRole==='owner';
  document.getElementById('sm_delbtn').style.display=isAdmin?'':'none';
  document.getElementById('sm_editbtn').style.display=isAdmin?'':'none';
  document.getElementById('sm_movebtn').style.display=isAdmin?'':'none';
  document.getElementById('sm_addbtn').style.display=isAdmin?'':'none';
  if(isAdmin) document.getElementById('sm_delbtn').onclick=function(){delSlot(row,col,floor);};
  window._sheet={row:row,col:col,floor:floor};
  document.getElementById('ov').classList.add('open');
}
function sheetBg(e){if(e.target.id==='ov')closeSheet();}
function closeSheet(){document.getElementById('ov').classList.remove('open');}
function delSlot(row,col,floor){
  var names=realTilesAt(row,col,floor).map(function(x){return x.name;}).join(', ');
  if(!confirm('ลบทุกลายในช่อง '+row+col+'-F'+floor+'?\n('+names+')')) return;
  var toDelete=items.filter(function(x){return x.row===row&&x.col==col&&x.floor==floor;});
  toDelete.forEach(function(x){deleteItem(x.id);});
  items=items.filter(function(x){return !(x.row===row&&x.col==col&&x.floor==floor);});
  closeSheet();showToast('🗑️ ลบแล้ว','ok');renderList();
}
function openPhoto(tileId){
  var el=null;for(var i=0;i<items.length;i++){if(items[i].id===tileId){el=items[i];break;}}
  if(!el||!el.photo) return;
  var v=document.createElement('div');
  v.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;';
  var img=document.createElement('img');img.src=el.photo;img.style.cssText='max-width:96vw;max-height:85dvh;border-radius:12px;object-fit:contain;';
  var closeBtn=document.createElement('button');closeBtn.textContent='✕ ปิด';
  closeBtn.style.cssText='position:absolute;top:14px;right:14px;background:rgba(255,255,255,.15);border:none;border-radius:50px;padding:7px 14px;font-size:13px;font-weight:700;color:white;cursor:pointer;font-family:Sarabun,sans-serif;';
  closeBtn.onclick=function(){v.remove();};
  v.appendChild(img);v.appendChild(closeBtn);v.onclick=function(e){if(e.target===v)v.remove();};
  document.body.appendChild(v);
}

function quickAddToSlot(){
  var s=window._sheet;closeSheet();
  go('add',document.getElementById('nb-add'));
  document.getElementById('fr').value=s.row;
  document.getElementById('ff').value=s.floor;
  document.getElementById('fc').value=s.col;
  showToast('📍 ตำแหน่ง '+s.row+s.col+'-F'+s.floor+' พร้อมแล้ว','ok');

}

function makeBrandSelect(id,current,onchg){
  var opts='<option value="">-- เลือกแบรนด์ --</option>';
  var isOther=current&&BRANDS.indexOf(current)<0;
  for(var i=0;i<BRANDS.length;i++) opts+='<option value="'+BRANDS[i]+'"'+(BRANDS[i]===current?' selected':'')+'>'+BRANDS[i]+'</option>';
  opts+='<option value="__other__"'+(isOther?' selected':'')+'>อื่นๆ (ระบุ)</option>';
  var inlineChg='(function(s){var o=s.parentNode.querySelector("input.brand-other");if(o)o.style.display=s.value==="__other__"?"block":"none";if('+onchg.replace(/"/g,"'")+');}).call(this,this)';
  return '<select id="'+id+'" onchange="toggleBrandOther(this.id)" style="width:100%;background:#fff;border:1.5px solid #e5e7eb;border-radius:7px;padding:8px 10px;font-family:Sarabun,sans-serif;font-size:13px;outline:none;">'+opts+'</select>'+
    '<input class="brand-other" id="'+id+'_other" placeholder="ระบุแบรนด์" value="'+(isOther?current:'')+'" style="width:100%;background:#fff;border:1.5px solid #e5e7eb;border-radius:7px;padding:8px 10px;font-family:Sarabun,sans-serif;font-size:13px;outline:none;margin-top:4px;'+(isOther?'':'display:none;')+'"/>';
}
function toggleSizeOther(selId,ppId){
  var sel=document.getElementById(selId);
  if(!sel) return;
  var othId=selId.replace('ed2_','ed2oth_');
  var o=document.getElementById(othId);
  if(o) o.style.display=sel.value==='__other__'?'block':'none';
  var pp=document.getElementById(ppId);
  if(pp&&TILES_PER_BOX[sel.value]){pp.placeholder=TILES_PER_BOX[sel.value]+' แผ่น';pp.value='';}
  else if(pp&&sel.value==='__other__'){pp.placeholder='กรอกเอง';}
}
function toggleBrandOther(selId){
  var sel=document.getElementById(selId);
  var other=document.getElementById(selId+'_other');
  if(other) other.style.display=sel.value==='__other__'?'block':'none';
}
function getBrandVal(selId){
  var sel=document.getElementById(selId);if(!sel) return '';
  if(sel.value==='__other__'){var o=document.getElementById(selId+'_other');return o?o.value.trim():'';}
  return sel.value;
}

function openEdit(){
  var s=window._sheet;
  var tiles=realTilesAt(s.row,+s.col,+s.floor);
  if(!tiles.length){openAdd();return;}
  var ov=document.createElement('div');ov.id='editOv';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;justify-content:center;';
  var inner=document.createElement('div');
  inner.style.cssText='background:#fff;border-radius:22px 22px 0 0;border-top:3px solid #2563eb;padding:20px 18px 44px;width:100%;max-width:480px;max-height:88dvh;overflow-y:auto;';
  var h='<div style="display:flex;justify-content:flex-end;margin-bottom:14px;"><button onclick="document.getElementById(\"editOv\").remove()" style="background:#f0f0eb;border:none;border-radius:50px;padding:7px 16px;font-family:Sarabun,sans-serif;font-size:13px;font-weight:700;cursor:pointer;">✕ ปิด</button></div>';
  h+='<div style="font-size:15px;font-weight:800;color:#92400e;margin-bottom:14px;">✏️ แก้ไข '+s.row+s.col+'-F'+s.floor+'</div>';

function saveEdit(tiles){
  var pending=0;
  for(var i=0;i<tiles.length;i++){
    var t=tiles[i];var it=null;
    for(var j=0;j<items.length;j++) if(items[j].id===t.id){it=items[j];break;}
    if(!it) continue;
    var nameEl=document.getElementById('en_'+t.id);
    if(nameEl&&nameEl.value.trim()) it.name=nameEl.value.trim();
    it.brand=getBrandVal('eb_'+t.id);
    var descEl=document.getElementById('ed2_'+t.id);
    if(descEl){
      if(descEl.value==='__other__'){
        var descOthEl=document.getElementById('ed2oth_'+t.id);
        it.desc=descOthEl?descOthEl.value.trim():it.desc;
      } else {
        it.desc=descEl.value;
      }
    }
    it.qty=+document.getElementById('eq_'+t.id).value||0;
    var euEl=document.getElementById('eu_'+t.id);
    if(euEl) it.unit=euEl.value;
    var ppEl=document.getElementById('epp_'+t.id);
    if(ppEl&&ppEl.value) it.customTpb=+ppEl.value; else if(ppEl&&!ppEl.value) delete it.customTpb;
    it.surface=document.getElementById('es_'+t.id).value;
    it.detail=document.getElementById('ed_'+t.id).value.trim();
    var pf=document.getElementById('ep_'+t.id).files[0];
    if(pf){
      pending++;
      (function(item,f){
        var r=new FileReader();
        r.onload=function(e2){
          compressImage(e2.target.result,800,800,0.75,function(compressed){
            item.photo=compressed;pending--;
            if(pending===0){
              tiles.forEach(function(tt){var ii=items.find(function(x){return x.id===tt.id;});if(ii)saveItem(ii);});
              var ov=document.getElementById('editOv');if(ov)ov.remove();
              showToast('✅ บันทึกแล้ว','ok');
              var s=window._sheet;openSheet(s.row,s.col,s.floor);
            }
          });
        };r.readAsDataURL(f);
      })(it,pf);
    }
  }
  if(pending===0){tiles.forEach(function(t){var it=items.find(function(x){return x.id===t.id;});if(it)saveItem(it);});var ov=document.getElementById('editOv');if(ov)ov.remove();showToast('✅ บันทึกแล้ว','ok');var s=window._sheet;openSheet(s.row,s.col,s.floor);}
}

function compressImage(dataUrl,maxW,maxH,quality,cb){
  var img=new Image();
  img.onload=function(){
    var w=img.width,h=img.height,ratio=Math.min(maxW/w,maxH/h,1);
    w=Math.round(w*ratio);h=Math.round(h*ratio);
    var canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
    var ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,w,h);
    cb(canvas.toDataURL('image/jpeg',quality));
  };img.src=dataUrl;
}

function calcWeight(){
  var total=0,details=[];
  for(var si=0;si<STEEL_ITEMS.length;si++){for(var ii=0;ii<STEEL_ITEMS[si].items.length;ii++){var item=STEEL_ITEMS[si].items[ii];var el=document.getElementById('wi_'+si+'_'+ii);if(!el)continue;var qty=+el.value||0;if(qty>0){var wt=item.w*qty;total+=wt;details.push(item.name+' × '+qty+' = '+wt.toFixed(3)+' กก');}}}
  for(var ci=0;ci<5;ci++){var wEl=document.getElementById('wcw_'+ci),qEl=document.getElementById('wcq_'+ci);if(wEl&&qEl){var w2=+wEl.value||0,q2=+qEl.value||0;if(w2>0&&q2>0){var wt2=w2*q2;total+=wt2;details.push('กรอกเอง ('+w2+' กก) × '+q2+' = '+wt2.toFixed(2)+' กก');}}}
  var res=document.getElementById('weightResult');
  if(total>0){
    res.style.display='block';
    document.getElementById('weightTotal').textContent=total.toFixed(2);
    document.getElementById('weightTons').textContent='('+( Math.ceil(total/100)/10).toFixed(1)+' ตัน)';
    document.getElementById('weightDetail').innerHTML=details.map(function(d){return '<div>• '+d+'</div>';}).join('');
    var trucks=window._trucks||[];
    for(var ti=0;ti<trucks.length;ti++){var ok=total<=trucks[ti].cap;var row=document.getElementById('truck_'+ti);var icon=document.getElementById('truckicon_'+ti);var nm=document.getElementById('truckname_'+ti);if(row){row.style.background=ok?'rgba(22,163,74,.08)':'rgba(239,68,68,.06)';row.style.borderColor=ok?'rgba(22,163,74,.25)':'rgba(239,68,68,.2)';}if(icon)icon.textContent=ok?'✅':'❌';if(nm)nm.style.color=ok?'#15803d':'#b91c1c';}
  } else {res.style.display='none';}
}

function calcFloor(){
  var total=0,details=[];
  var lens=[0.5,1.0,1.5,2.0,2.5,3.0,3.5,4.0,4.5,5.0];
  for(var li=0;li<lens.length;li++){var inp=document.getElementById('fl_'+li);if(!inp)continue;var qty=+inp.value||0;if(qty>0){var sqm=0.35*lens[li]*qty;total+=sqm;details.push(lens[li].toFixed(1)+' ม × '+qty+' แผ่น = '+sqm.toFixed(2)+' ตรม');}}
  for(var ci=0;ci<2;ci++){var lEl=document.getElementById('flcl_'+ci),qEl=document.getElementById('flcq_'+ci);if(lEl&&qEl){var cLen=+lEl.value||0,cQty=+qEl.value||0;if(cLen>0&&cQty>0){var sqm2=0.35*cLen*cQty;total+=sqm2;details.push(cLen.toFixed(1)+' ม × '+cQty+' แผ่น = '+sqm2.toFixed(2)+' ตรม');}}}
  var res=document.getElementById('floorResult');
  if(total>0){res.style.display='block';document.getElementById('floorSqm').textContent=total.toFixed(2);document.getElementById('floorDetail').innerHTML=details.map(function(d){return '<div>• '+d+'</div>';}).join('');var ship=document.getElementById('floorShipping'),free=document.getElementById('floorFreeMsg');if(total>=100){ship.style.display='none';free.style.display='block';}else{ship.style.display='block';free.style.display='none';}}
  else{res.style.display='none';}
}
function resetFloor(){

  document.getElementById('floorResult').style.display='none';
}

function svgPlate(w,l,t,qty,hole,edge){
  var PAD=50,scale=Math.min(240/w,320/l,1),sw=Math.round(w*scale),sl=Math.round(l*scale),VW=sw+PAD*2,VH=sl+PAD*2+52;
  var ef=edge,hr=Math.round(hole*scale/2),e=Math.round(edge*scale);
  var cx1=e+hr,cy1=e+hr,cx2=sw-(e+hr),cy2=sl-(e+hr);
  var gw=w-edge*2-hole*2,gl=l-edge*2-hole*2;
  var s='<svg viewBox="0 0 '+VW+' '+VH+'" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%;max-width:340px;margin:0 auto;border-radius:8px;background:#f8fafc;">';
  s+='<rect x="'+PAD+'" y="'+PAD+'" width="'+sw+'" height="'+sl+'" fill="#9ca3af" stroke="#374151" stroke-width="2" rx="2"/>';
  [[cx1,cy1],[cx2,cy1],[cx1,cy2],[cx2,cy2]].forEach(function(h2){s+='<circle cx="'+(PAD+h2[0])+'" cy="'+(PAD+h2[1])+'" r="'+hr+'" fill="#1e293b" stroke="#0f172a" stroke-width="1"/>';});
  // green lines
  s+='<line x1="'+(PAD+cx1+hr)+'" y1="'+(PAD+cy1)+'" x2="'+(PAD+cx2-hr)+'" y2="'+(PAD+cy1)+'" stroke="#22c55e" stroke-width="2.5"/>';
  s+='<line x1="'+(PAD+cx1+hr)+'" y1="'+(PAD+cy2)+'" x2="'+(PAD+cx2-hr)+'" y2="'+(PAD+cy2)+'" stroke="#22c55e" stroke-width="2.5"/>';
  s+='<line x1="'+(PAD+cx1)+'" y1="'+(PAD+cy1+hr)+'" x2="'+(PAD+cx1)+'" y2="'+(PAD+cy2-hr)+'" stroke="#22c55e" stroke-width="2.5"/>';
  s+='<line x1="'+(PAD+cx2)+'" y1="'+(PAD+cy1+hr)+'" x2="'+(PAD+cx2)+'" y2="'+(PAD+cy2-hr)+'" stroke="#22c55e" stroke-width="2.5"/>';
  // hole labels
  [[cx1,cy1],[cx2,cy1],[cx1,cy2],[cx2,cy2]].forEach(function(h2){var lx=PAD+h2[0]+hr+4;var ly=PAD+h2[1]-hr-6;var hw=hole.toString().length*7+22;s+='<rect x="'+lx+'" y="'+(ly-14)+'" width="'+hw+'" height="18" rx="4" fill="#f59e0b"/>';s+='<text x="'+(lx+hw/2)+'" y="'+ly+'" text-anchor="middle" font-size="9" fill="white" font-family="monospace" font-weight="bold">⌀'+hole+'</text>';});
  // edge labels
  var corners=[[e/2,cy1],[cx1,e/2],[sw-e/2,cy1],[cx2,e/2],[e/2,cy2],[cx1,sl-e/2],[sw-e/2,cy2],[cx2,sl-e/2]];
  corners.forEach(function(p){s+='<text x="'+(PAD+p[0])+'" y="'+(PAD+p[1]+4)+'" text-anchor="middle" font-size="9" fill="#dc2626" font-family="monospace">'+ef+'</text>';});
  // dims
  var dY=PAD-24,dX=PAD-28;
  s+='<line x1="'+PAD+'" y1="'+(dY+4)+'" x2="'+(PAD+sw)+'" y2="'+(dY+4)+'" stroke="#1e40af" stroke-width="1.2"/><line x1="'+PAD+'" y1="'+dY+'" x2="'+PAD+'" y2="'+(dY+8)+'" stroke="#1e40af" stroke-width="1.2"/><line x1="'+(PAD+sw)+'" y1="'+dY+'" x2="'+(PAD+sw)+'" y2="'+(dY+8)+'" stroke="#1e40af" stroke-width="1.2"/>';
  s+='<text x="'+(PAD+sw/2)+'" y="'+(dY-2)+'" text-anchor="middle" font-size="14" fill="#1e40af" font-family="monospace" font-weight="bold">'+w+'</text>';
  s+='<line x1="'+(dX+4)+'" y1="'+PAD+'" x2="'+(dX+4)+'" y2="'+(PAD+sl)+'" stroke="#1e40af" stroke-width="1.2"/><line x1="'+dX+'" y1="'+PAD+'" x2="'+(dX+8)+'" y2="'+PAD+'" stroke="#1e40af" stroke-width="1.2"/><line x1="'+dX+'" y1="'+(PAD+sl)+'" x2="'+(dX+8)+'" y2="'+(PAD+sl)+'" stroke="#1e40af" stroke-width="1.2"/>';
  s+='<text x="'+(dX-4)+'" y="'+(PAD+sl/2)+'" text-anchor="middle" font-size="14" fill="#1e40af" font-family="monospace" font-weight="bold" transform="rotate(-90,'+(dX-4)+','+(PAD+sl/2)+')">'+l+'</text>';
  // green labels
  s+='<text x="'+(PAD+sw/2)+'" y="'+(PAD+cy1-6)+'" text-anchor="middle" font-size="13" fill="#15803d" font-family="monospace" font-weight="bold">'+gw+'</text>';
  s+='<text x="'+(PAD+cx1-8)+'" y="'+(PAD+(cy1+cy2)/2)+'" text-anchor="end" font-size="13" fill="#15803d" font-family="monospace" font-weight="bold">'+gl+'</text>';
  var infoY=PAD+sl+18;

function savePlateImg(btn){
  var prev=btn.previousElementSibling;var svgEl=prev?prev.querySelector('svg'):null;
  if(!svgEl){showToast('ใส่ขนาดก่อนนะครับ','err');return;}
  var svgData=new XMLSerializer().serializeToString(svgEl);
  var canvas=document.createElement('canvas');var vb=svgEl.viewBox.baseVal;
  canvas.width=vb.width*2;canvas.height=vb.height*2;
  var ctx=canvas.getContext('2d');ctx.fillStyle='#f8fafc';ctx.fillRect(0,0,canvas.width,canvas.height);
  var img=new Image();
  var blob=new Blob([svgData],{type:'image/svg+xml'});var url=URL.createObjectURL(blob);
  img.onload=function(){ctx.drawImage(img,0,0,canvas.width,canvas.height);URL.revokeObjectURL(url);var a=document.createElement('a');a.download='plate.png';a.href=canvas.toDataURL('image/png');a.click();showToast('📥 บันทึกภาพแล้ว','ok');};
  img.src=url;
}
